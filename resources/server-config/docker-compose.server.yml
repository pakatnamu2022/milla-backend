services:
    app:
        build: .
        working_dir: /var/www/html
        ports:
            - "127.0.0.1:9000:9000"
        volumes:
            - ./app:/var/www/html
            - ./ops/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
        environment:
            APP_ENV: production
            REDIS_HOST: redis
            REDIS_PORT: 6379
            CACHE_DRIVER: redis

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3

    horizon:
        build: .
        working_dir: /var/www/html
        command: bash -lc "php artisan horizon"
        volumes:
            - ./app:/var/www/html
            - ./ops/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
        extra_hosts:
            - "host.docker.internal:host-gateway"
        environment:
            APP_ENV: production
            QUEUE_CONNECTION: redis
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: "null"
            CACHE_DRIVER: redis
            DB_HOST: host.docker.internal
        restart: unless-stopped
        depends_on:
            redis:
                condition: service_healthy
            app:
                condition: service_started

volumes:
    redis-data:
